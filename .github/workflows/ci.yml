name: ci

# Build + checkasm across both architectures and, where emulation is accurate,
# across ISA extension levels the runner hardware may not have:
#   x86-64 : native, QEMU-forced AVX2, and optional SDE-forced AVX512-BF16
#   arm64  : native NEON, then QEMU forcing other -cpu feature sets (e.g. SVE2)
#
# The kernel dispatch auto-selects the best ISA the (real or emulated) CPU
# reports, so as SSE2 / AVX-512 / SVE2 kernels land they are exercised here
# automatically with no workflow changes.
#
# QEMU TCG does not currently execute AVX-512/BF16 on GitHub-hosted runners; set
# repository variable PEREGRINE_SDE_TAR_URL, plus optional PEREGRINE_SDE_SHA256,
# to make the AVX512-BF16 checkasm path a hard Intel SDE gate.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build nasm qemu-user
      - name: Build
        run: |
          meson setup build
          meson compile -C build
      - name: checkasm (native)
        run: meson test -C build --print-errorlogs
      - name: checkasm --bench (native, informational)
        run: ./build/tests/checkasm --bench --seed=0x1
      - name: checkasm under QEMU (forced x86 AVX2 levels)
        shell: bash
        run: |
          set -euo pipefail

          avx2_variants=(
            dot_f32.avx2
            axpy_f32.avx2
            rmsnorm_f32.avx2
            sum_f32.avx2
            max_f32.avx2
            mul_f32.avx2
            add_f32.avx2
            silu_f32.avx2
            gelu_f32.avx2
            softmax_f32.avx2
            exp_f32.avx2
            sgemm_f32.avx2
            sgemv_f32.avx2
            bf16gemm.avx2
            fp16gemm.avx2
          )

          run_qemu() {
            local label="$1"
            local cpu="$2"
            shift 2
            local log="checkasm-${label}.log"

            echo "::group::qemu-x86_64 -cpu ${cpu}"
            qemu-x86_64 -cpu "$cpu" ./build/tests/checkasm --seed=0x1234abcd | tee "$log"

            local expected
            for expected in "$@"; do
              if ! grep -Fq "  [ok] ${expected}" "$log"; then
                echo "::error::${label}: missing expected checkasm variant '${expected}'"
                exit 1
              fi
            done
            echo "::endgroup::"
          }

          run_qemu haswell-avx2 Haswell-v4 "${avx2_variants[@]}"

          run_qemu skylake-avx512-no-bf16 Skylake-Server-v5 "${avx2_variants[@]}"
          if grep -Fq "  [ok] bf16gemm.avx512bf16" checkasm-skylake-avx512-no-bf16.log; then
            echo "::error::Skylake-Server-v5 unexpectedly exposed AVX512-BF16"
            exit 1
          fi

      - name: checkasm under Intel SDE (forced AVX512-BF16)
        if: ${{ vars.PEREGRINE_SDE_TAR_URL != '' }}
        shell: bash
        env:
          PEREGRINE_SDE_TAR_URL: ${{ vars.PEREGRINE_SDE_TAR_URL }}
          PEREGRINE_SDE_SHA256: ${{ vars.PEREGRINE_SDE_SHA256 }}
        run: |
          set -euo pipefail

          curl -fsSL --retry 3 -o sde.tar.xz "$PEREGRINE_SDE_TAR_URL"
          if [ -n "${PEREGRINE_SDE_SHA256}" ]; then
            echo "${PEREGRINE_SDE_SHA256}  sde.tar.xz" | sha256sum -c -
          fi
          tar xf sde.tar.xz

          sde_bin="$(find "$PWD" -maxdepth 3 -type f -name sde64 -print -quit)"
          if [ -z "$sde_bin" ] || [ ! -x "$sde_bin" ]; then
            echo "::error::Unable to find executable sde64 in SDE archive"
            exit 1
          fi

          "$sde_bin" -spr -- ./build/tests/checkasm --seed=0x1234abcd | tee checkasm-sde-spr.log

          avx2_variants=(
            dot_f32.avx2
            axpy_f32.avx2
            rmsnorm_f32.avx2
            sum_f32.avx2
            max_f32.avx2
            mul_f32.avx2
            add_f32.avx2
            silu_f32.avx2
            gelu_f32.avx2
            softmax_f32.avx2
            exp_f32.avx2
            sgemm_f32.avx2
            sgemv_f32.avx2
            bf16gemm.avx2
            fp16gemm.avx2
          )

          expected_variants=("${avx2_variants[@]}" bf16gemm.avx512bf16)
          for expected in "${expected_variants[@]}"; do
            if ! grep -Fq "  [ok] ${expected}" checkasm-sde-spr.log; then
              echo "::error::Intel SDE SPR run missing expected checkasm variant '${expected}'"
              exit 1
            fi
          done

      - name: AVX512-BF16 CI coverage note
        if: ${{ vars.PEREGRINE_SDE_TAR_URL == '' }}
        run: |
          echo "::warning::AVX512-BF16 checkasm was not run: GitHub-hosted QEMU TCG does not execute AVX-512/BF16. Configure PEREGRINE_SDE_TAR_URL/PEREGRINE_SDE_SHA256 to make Intel SDE validation a hard gate."

  arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build qemu-user
      - name: Build
        run: |
          meson setup build
          meson compile -C build
      - name: checkasm (native NEON)
        run: meson test -C build --print-errorlogs
      - name: checkasm under QEMU (forced -cpu feature sets)
        run: |
          # qemu-user presents the chosen -cpu features to the guest regardless of
          # host silicon, so 'max' exercises SVE/SVE2 paths as they are added.
          for cpu in cortex-a72 neoverse-v1 max; do
            echo "::group::qemu -cpu $cpu"
            qemu-aarch64 -cpu "$cpu" ./build/tests/checkasm --seed=0x1234abcd
            echo "::endgroup::"
          done
