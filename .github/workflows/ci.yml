name: ci

# Build + checkasm across both architectures and, via emulation, across ISA
# extension levels the runner hardware may not have:
#   x86-64 : native, then Intel SDE forcing SSE/AVX2/AVX-512 paths
#   arm64  : native NEON, then QEMU forcing other -cpu feature sets (e.g. SVE2)
#
# The kernel dispatch auto-selects the best ISA the (real or emulated) CPU
# reports, so as SSE2 / AVX-512 / SVE2 kernels land they are exercised here
# automatically with no workflow changes.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build nasm
      - name: Build
        run: |
          meson setup build
          meson compile -C build
      - name: checkasm (native)
        run: meson test -C build --print-errorlogs
      - name: checkasm under Intel SDE (forced ISA levels, best-effort)
        run: |
          set -u
          # Intel SDE runs the x86 binary as if on Penryn / Haswell / Skylake-X /
          # Sapphire Rapids, which exercises the SSE4 / AVX2 / AVX-512 paths as
          # kernels add them. The SDE download is license-gated and its URL id
          # rotates, so this step is best-effort: if it can't be fetched it skips
          # without failing the job (the native AVX2 run above already covers
          # today's kernels). Update SDE_VER / SDE_ID when a new SDE ships.
          SDE_VER=9.53.0-2025-03-16
          SDE_ID=843185
          url="https://downloadmirror.intel.com/${SDE_ID}/sde-external-${SDE_VER}-lin.tar.xz"
          if ! curl -fsSL -o sde.tar.xz "$url" || ! tar xf sde.tar.xz 2>/dev/null; then
            echo "::notice::Intel SDE unavailable (fetch/extract failed for ${url}); skipping ISA emulation."
            exit 0
          fi
          SDE="$(pwd)/sde-external-${SDE_VER}-lin/sde64"
          for isa in -p4p -hsw -skx -spr; do   # SSE4, AVX2, AVX-512 (SKX), AVX-512 (SPR)
            echo "::group::SDE $isa"
            "$SDE" "$isa" -- ./build/tests/checkasm --seed=0x1234abcd
            echo "::endgroup::"
          done

  arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y meson ninja-build qemu-user
      - name: Build
        run: |
          meson setup build
          meson compile -C build
      - name: checkasm (native NEON)
        run: meson test -C build --print-errorlogs
      - name: checkasm under QEMU (forced -cpu feature sets)
        run: |
          # qemu-user presents the chosen -cpu features to the guest regardless of
          # host silicon, so 'max' exercises SVE/SVE2 paths as they are added.
          for cpu in cortex-a72 neoverse-v1 max; do
            echo "::group::qemu -cpu $cpu"
            qemu-aarch64 -cpu "$cpu" ./build/tests/checkasm --seed=0x1234abcd
            echo "::endgroup::"
          done
